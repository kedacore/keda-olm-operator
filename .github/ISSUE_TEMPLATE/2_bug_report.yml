name: Report a bug
description: Create a report to help us improve
labels: "needs-triage,bug"
body:
  - type: textarea
    attributes:
      label: Report
      description: "What bug have you encountered?"
      placeholder: "A clear and concise description of what the bug is."
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual Behavior
      description: Also tell us, what did you see is happen?
      placeholder: Tell us what you see that is happening
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to Reproduce the Problem
      description: "How can we reproduce this bug? Please walk us through it step by step."
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs from KEDA OLM Operator
      description: "Provide logs from the KEDA OLM Operator, if need be."
      value: |
        ```
        example
        ```
    validations:
      required: false
  - type: input
    attributes:
      label: KEDA OLM Operator Version
      description: What version of the KEDA OLM Operator are you running?
      placeholder: "e.g., 0.14.0"
    validations:
      required: false
  - type: input
    attributes:
      label: KEDA Version
      description: What version of KEDA are you running?
      placeholder: "e.g., 2.16.0"
    validations:
      required: false
  - type: input
    attributes:
      label: Kubernetes Version
      description: What version of Kubernetes are you running?
      placeholder: "e.g., 1.35 — run 'kubectl version' to check"
    validations:
      required: false
  - type: input
    attributes:
      label: OLM Version
      description: What version of OLM are you running?
      placeholder: "e.g., 0.28.0"
    validations:
      required: false
  - type: dropdown
    attributes:
      label: Platform
      description: Where is your cluster running?
      options:
        - Any
        - Alibaba Cloud
        - Amazon Web Services
        - Google Cloud
        - Microsoft Azure
        - Red Hat OpenShift
        - Other
    validations:
      required: false
  - type: dropdown
    attributes:
      label: Would you be open to contributing a fix?
      options:
        - "No"
        - "Yes"
    validations:
      required: false
  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: "Let us know if you have anything else to share"
