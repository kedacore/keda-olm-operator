name: CI
on: [pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run unit tests
        run: make test

      - name: Run functionality tests
        run: make test-functionality

      - name: Run audit flags tests
        run: make test-audit
  statics:
    name: Static Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          SKIP: golangci-lint

  test-build:
    name: Test Image Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          lfs: true

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Go modules cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /go/pkg
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Test build
        run: make docker-build

  e2e:
    name: E2E Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Create kind cluster with local registry
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        env:
          # renovate: datasource=github-releases depName=kubernetes-sigs/kind
          KIND_VERSION: "v0.32.0"
          # renovate: datasource=docker depName=kindest/node
          KIND_NODE_VERSION: "v1.36.1"
        with:
          cluster_name: kind
          node_image: kindest/node:${{ env.KIND_NODE_VERSION }}
          registry: true
          version: ${{ env.KIND_VERSION }}

      - name: Install OLM
        env:
          # renovate: datasource=github-releases depName=operator-framework/operator-lifecycle-manager
          OLM_VERSION: "v0.45.0"
        run: make operator-sdk && ./bin/operator-sdk olm install --version "$OLM_VERSION"

      - name: Build and deploy operator via OLM
        run: make e2e-olm-setup
        env:
          IMAGE_REGISTRY: kind-registry:5000

      - name: Run e2e tests
        run: make e2e-test-ci

      - name: Diagnostics
        if: failure()
        run: |
          echo "=== All pods ==="
          kubectl get pods -A
          echo "=== Pods in keda namespace ==="
          kubectl describe pods -n keda
          echo "=== OLM resources ==="
          kubectl get csv,sub,installplan -n keda 2>/dev/null || true
          echo "=== Operator logs ==="
          kubectl logs -n keda -l app.kubernetes.io/part-of=keda-olm-operator --tail=200 || true
