apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: operator
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  name: keda-add-ons-http-operator-metrics
  namespace: keda
spec:
  ports:
    - name: metrics-http
      port: 8080
      protocol: TCP
      targetPort: metrics-http
    - name: metrics-https
      port: 8443
      protocol: TCP
      targetPort: metrics-https
  selector:
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/component: operator
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: operator
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  name: keda-add-ons-http-operator
  namespace: keda
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: http-add-on
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: http-add-on
        app.kubernetes.io/component: operator
    spec:
      containers:
        - args:
            - --leader-elect
            - --zap-log-level=info
            - --zap-encoder=console
            - --zap-time-encoding=rfc3339
          env:
            - name: KEDA_HTTP_OPERATOR_EXTERNAL_SCALER_SERVICE
              value: keda-add-ons-http-external-scaler
            - name: KEDA_HTTP_OPERATOR_EXTERNAL_SCALER_PORT
              value: "9090"
            - name: KEDA_HTTP_OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: ghcr.io/kedacore/http-add-on-operator:0.15.0@sha256:d579b952ff0a0c3046a49d0e066bc06d33d1944b5f89b5fac5145d89f9f78959
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          name: operator
          ports:
            - containerPort: 8080
              name: metrics-http
            - containerPort: 8443
              name: metrics-https
            - containerPort: 8081
              name: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          resources:
            limits:
              cpu: 1000m
              memory: 1000Mi
            requests:
              cpu: 100m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: keda-add-ons-http-operator
      terminationGracePeriodSeconds: 10
---
