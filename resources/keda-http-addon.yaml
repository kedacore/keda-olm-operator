apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  labels:
    app.kubernetes.io/component: interceptor
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  name: keda-add-ons-http-interceptor
  namespace: keda
spec:
  maxReplicaCount: 50
  minReplicaCount: 1
  pollingInterval: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: keda-add-ons-http-interceptor
  triggers:
    - metadata:
        interceptorTargetPendingRequests: "200"
        scalerAddress: keda-add-ons-http-external-scaler:9090
      type: external
