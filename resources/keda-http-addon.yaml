apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: scaler
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  name: keda-add-ons-http-external-scaler
  namespace: keda
spec:
  ports:
    - name: grpc
      port: 9090
      protocol: TCP
      targetPort: grpc
  selector:
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/component: external-scaler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: scaler
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  name: keda-add-ons-http-scaler
  namespace: keda
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: http-add-on
      app.kubernetes.io/component: external-scaler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: http-add-on
        app.kubernetes.io/component: external-scaler
    spec:
      containers:
        - args:
            - --zap-log-level=info
            - --zap-encoder=console
            - --zap-time-encoding=rfc3339
          env:
            - name: KEDA_HTTP_SCALER_TARGET_ADMIN_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KEDA_HTTP_SCALER_TARGET_ADMIN_DEPLOYMENT
              value: keda-add-ons-http-interceptor
            - name: KEDA_HTTP_SCALER_TARGET_ADMIN_SERVICE
              value: keda-add-ons-http-interceptor-admin
            - name: KEDA_HTTP_SCALER_TARGET_ADMIN_PORT
              value: "9090"
            - name: KEDA_HTTP_SCALER_PORT
              value: "9090"
          image: ghcr.io/kedacore/http-add-on-scaler:0.15.0@sha256:f748178bc4af9e546d5da38c4e1b1d8d236a343bb30927b292131c6f4c978394
          livenessProbe:
            failureThreshold: 3
            grpc:
              port: 9090
              service: liveness
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          name: scaler
          ports:
            - containerPort: 9090
              name: grpc
            - containerPort: 2223
              name: metrics
          readinessProbe:
            failureThreshold: 3
            grpc:
              port: 9090
              service: readiness
            periodSeconds: 1
            successThreshold: 1
            timeoutSeconds: 1
          resources:
            limits:
              cpu: 1000m
              memory: 1000Mi
            requests:
              cpu: 100m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: keda-add-ons-http-scaler
      terminationGracePeriodSeconds: 10
