              name: proxy
            - containerPort: 8443
              name: proxy-tls
            - containerPort: 2223
              name: metrics
          readinessProbe:
            httpGet:
              path: /readyz
              port: admin
          resources:
            limits:
              cpu: 1000m
              memory: 1000Mi
            requests:
              cpu: 100m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
