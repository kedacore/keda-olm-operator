apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: operator
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  name: keda-add-ons-http-operator-metrics
  namespace: keda
spec:
  ports:
    - name: metrics-http
      port: 8080
      protocol: TCP
      targetPort: metrics-http
    - name: metrics-https
      port: 8443
      protocol: TCP
      targetPort: metrics-https
  selector:
    app.kubernetes.io/component: add-on
    app.kubernetes.io/instance: operator
    app.kubernetes.io/name: http
    app.kubernetes.io/part-of: keda
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: operator
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
  name: keda-add-ons-http-operator
  namespace: keda
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: add-on
      app.kubernetes.io/instance: operator
      app.kubernetes.io/name: http
      app.kubernetes.io/part-of: keda
  template:
    metadata:
      labels:
        app.kubernetes.io/component: add-on
        app.kubernetes.io/instance: operator
        app.kubernetes.io/name: http
        app.kubernetes.io/part-of: keda
    spec:
      containers:
        - args:
            - --leader-elect
            - --zap-log-level=info
            - --zap-encoder=console
            - --zap-time-encoding=rfc3339
          env:
            - name: KEDAHTTP_OPERATOR_EXTERNAL_SCALER_SERVICE
              value: keda-add-ons-http-external-scaler
            - name: KEDAHTTP_OPERATOR_EXTERNAL_SCALER_PORT
              value: "9090"
            - name: KEDA_HTTP_OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: ghcr.io/kedacore/http-add-on-operator:0.14.0@sha256:f3f6049a48651089037485a75b081bffd0caae2473b27225eddb516a10745c1c
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
          name: operator
          ports:
            - containerPort: 8080
              name: metrics-http
            - containerPort: 8443
              name: metrics-https
            - containerPort: 8081
              name: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          resources:
            limits:
              cpu: 1000m
              memory: 1000Mi
            requests:
              cpu: 100m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: keda-add-ons-http-operator
      terminationGracePeriodSeconds: 10
---
